<!DOCTYPE html>
<html lang="id" style="color-scheme:light;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Project — ArtaJava</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/twemoji.min.js" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7EEDA;
    --ink:#3B1015;
    --card:rgba(122,31,46,0.05);
    --card-border:rgba(122,31,46,0.16);
    --field-bg:#FFF8E9;
    --cream:#3B1015;
    --cream-dim:rgba(59,16,21,0.66);
    --cream-dimmer:rgba(59,16,21,0.42);
    --pink:#7A1F2E;
    --violet:#5C1220;
    --gold:#C6A15B;
    --teal:#C6A15B;
    --danger:#8C2020;
    --radius:22px;
  }
  img.emoji{height:1.1em;width:1.1em;vertical-align:-0.15em;display:inline-block;}
  *{box-sizing:border-box;color-scheme:light;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--cream);min-height:100vh;position:relative;overflow-x:hidden;}
  .bg-frame{position:fixed;inset:14px;border:1px solid rgba(198,161,91,0.18);border-radius:2px;z-index:0;pointer-events:none;}

  #app{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:20px 18px 80px;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;}

  input,textarea,select{background:var(--field-bg);color:var(--cream);border:1px solid rgba(198,161,91,.45);box-shadow:inset 0 1px 2px rgba(122,31,46,.05);font-family:inherit;accent-color: var(--pink);}
  input::placeholder,textarea::placeholder{color:var(--cream-dimmer);}
  select option{background:var(--field-bg);color:var(--cream);}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pink);}

  /* Gate screen */
  .gate-wrap{min-height:100vh;min-height:100dvh;margin:-20px calc(-50vw + 50%) -80px;width:100vw;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;padding:20px;background-repeat:no-repeat!important;background-position:center center!important;background-size:cover!important;}
  .gate-card{max-width:460px;width:100%;background:rgba(122,31,46,.88);border:1px solid rgba(255,255,255,.15);border-radius:28px;padding:36px 30px;text-align:center;box-shadow:0 18px 40px rgba(59,16,21,.4);}
  .gate-logo{max-width:220px;margin:0 auto 18px;display:block;}
  .gate-card h2{margin:0 0 8px;font-size:24px;color:#fff;}
  .gate-card p{color:rgba(255,255,255,.78);font-size:13.5px;margin:0 0 26px;}
  .gate-btns{display:flex;flex-direction:column;gap:12px;}
  .gate-btn{cursor:pointer;border:1px solid var(--card-border);background:rgba(255,255,255,.9);color:var(--cream);padding:16px 18px;border-radius:16px;font-family:inherit;font-weight:700;font-size:14.5px;transition:.2s;text-align:left;display:flex;align-items:center;gap:12px;}
  .gate-btn .ge{font-size:22px;}
  .gate-btn:hover{border-color:var(--pink);background:rgba(140,31,46,.10);}
  .gate-btn.vendor{background:rgba(230,200,140,.35);}
  .pin-box{margin-top:16px;display:none;}
  .pin-box.show{display:block;}
  .pin-box input{width:100%;text-align:center;letter-spacing:.5em;font-size:20px;padding:12px;border-radius:14px;margin-bottom:10px;}
  .pin-error{color:#8C2438;font-size:12.5px;margin-top:6px;min-height:16px;}

  /* Kontras elemen di dalam gate-card (background gelap maroon) */
  .gate-card .pin-error{color:#FFB4C0;font-weight:700;}
  .gate-card .btn.ghost{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.55);color:#fff;}
  .gate-card .btn.ghost:hover{background:rgba(255,255,255,.16);border-color:#fff;}
  .pin-box-pw-wrap{position:relative;}
  .pin-box-pw-wrap input{padding-right:44px;letter-spacing:.15em;}
  .pw-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;font-size:16px;padding:6px;line-height:1;color:var(--cream-dimmer);}
  .gate-card .pw-toggle{color:rgba(255,255,255,.6);}
  .gate-card .pw-toggle:hover{color:#fff;}

  /* Top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:16px;background:linear-gradient(135deg,#5C1220,#7A1F2E);border-radius:18px;padding:14px 20px;box-shadow:0 4px 14px rgba(59,16,21,.18);}
  .brand{display:flex;align-items:center;gap:12px;background:transparent;padding:0;border-radius:0;}
  .brand img{height:40px;width:auto;}
  .brand-fallback{display:flex;align-items:center;gap:10px;}
  .brand-fallback .dot{width:10px;height:10px;border-radius:50%;background:var(--gold);}
  .brand-fallback span{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-dim);font-weight:600;}

  .topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .pic-chip{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--card-border);border-radius:100px;padding:6px 14px 6px 6px;}
  .pic-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--pink);flex-shrink:0;}
  .pic-info{line-height:1.25;}
  .pic-name{font-size:12px;font-weight:700;}
  .pic-role{font-size:10.5px;color:var(--cream-dim);}
  .pic-role a{color:var(--gold);text-decoration:none;font-weight:700;}
  .pic-role a:hover{text-decoration:underline;}

  .mode-pill{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:100px;background:var(--card);border:1px solid var(--card-border);font-size:13px;font-weight:600;}
  .mode-pill.vendor{background:rgba(140,31,46,.20);}
  .mode-pill .pulse{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 0 rgba(212,175,55,.6);animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(212,175,55,.5)}70%{box-shadow:0 0 0 8px rgba(212,175,55,0)}100%{box-shadow:0 0 0 0 rgba(212,175,55,0)}}
  .btn.tiny{padding:6px 11px;font-size:11.5px;}

  /* Kontras elemen di dalam topbar gelap */
  .topbar .btn{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.28);}
  .topbar .btn:hover{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.4);color:#fff;}
  .topbar .btn.primary{background:var(--gold);color:var(--ink);border-color:transparent;}
  .topbar .btn.danger:hover{color:#ffd9d9;border-color:#ffd9d9;}
  .topbar .pic-chip{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.24);}
  .topbar .pic-name{color:#fff;}
  .topbar .pic-role{color:rgba(255,255,255,.72);}
  .topbar .pic-role a{color:var(--gold);}
  .topbar .mode-pill{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.24);color:#fff;}
  .topbar .mode-pill.vendor{background:rgba(255,255,255,.22);}

  .linkpanel{background:var(--card);border:1px solid var(--card-border);border-radius:18px;padding:14px 16px;margin-bottom:22px;}
  .linkpanel .lp-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--cream-dim);margin-bottom:10px;font-weight:700;}
  .lp-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
  .lp-row:last-child{margin-bottom:0;}
  .lp-label{font-size:12px;color:var(--cream-dim);min-width:110px;font-weight:600;}
  .lp-input{flex:1;min-width:220px;background:rgba(122,31,46,.05);border:1px solid var(--card-border);border-radius:10px;padding:8px 10px;font-size:12.5px;color:var(--cream-dim);}
  .lp-note{font-size:11.5px;color:var(--cream-dimmer);margin-top:8px;line-height:1.5;}

  /* Hero */
  .hero{border-radius:28px;padding:34px 28px;position:relative;overflow:hidden;background:rgba(140,31,46,.10);border:1px solid var(--card-border);margin-bottom:22px;display:grid;grid-template-columns:1.3fr 1fr;gap:24px;}
  @media(max-width:760px){.hero{grid-template-columns:1fr;}}
  .hero .names{font-size:clamp(30px,5vw,46px);line-height:1.05;margin:0 0 6px;}
  .hero .names em{font-style:italic;color:var(--gold);}
  .hero .hashtag{color:var(--cream-dim);font-size:14px;margin-bottom:18px;}
  .hero-meta{display:flex;gap:22px;flex-wrap:wrap;margin-top:6px;}
  .hero-meta .item{flex:1 1 200px;min-width:180px;max-width:100%;}
  .hero-meta .item .label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--cream-dimmer);margin-bottom:4px;}
  .hero-meta .item .val{font-size:15px;font-weight:600;}
  .hero-meta input[type=date], .hero-meta input[type=text]{background:transparent;border:none;border-bottom:1px dashed var(--card-border);color:var(--cream);font-family:inherit;font-size:15px;font-weight:600;padding:2px 0;width:100%;max-width:280px;box-sizing:border-box;}
  .hero-meta input:focus{outline:none;border-color:var(--pink);}
  .names input{background:transparent;border:none;color:var(--cream);font-family:'Fraunces',serif;font-size:inherit;font-weight:600;width:47%;}

  .ring-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
  .ring{position:relative;width:150px;height:150px;}
  .ring svg{transform:rotate(-90deg);}
  .ring .track{fill:none;stroke:rgba(122,31,46,.08);stroke-width:10;}
  .ring .prog{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .6s ease;}
  .ring-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-num .n{font-family:'Fraunces',serif;font-size:34px;font-weight:600;line-height:1;}
  .ring-num .s{font-size:10.5px;color:var(--cream-dim);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}
  .ring-caption{font-size:12.5px;color:var(--cream-dim);text-align:center;}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
  @media(max-width:900px){.stats{grid-template-columns:1fr 1fr;}}
  .stat-card{background:var(--card);border:1px solid var(--card-border);border-radius:18px;padding:16px 18px;}
  .stat-card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .stat-card .icon{font-size:18px;}
  .stat-card .big{font-family:'Fraunces',serif;font-size:26px;font-weight:600;}
  .stat-card .lbl{font-size:12px;color:var(--cream-dim);}
  .bar{height:6px;border-radius:6px;background:rgba(122,31,46,.08);overflow:hidden;margin-top:10px;}
  .bar > div{height:100%;background:var(--gold);border-radius:6px;}

  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;position:sticky;top:10px;z-index:5;}
  .tab-btn{padding:10px 18px;border-radius:100px;border:1px solid var(--card-border);background:rgba(255,255,255,.6);backdrop-filter:blur(10px);color:var(--cream-dim);font-family:inherit;font-weight:600;font-size:13.5px;cursor:pointer;transition:.2s;}
  .tab-btn.active{color:var(--ink);background:var(--gold);border-color:transparent;}
  .tab-btn:not(.active):hover{color:var(--cream);border-color:var(--pink);}

  section.panel{display:none;}
  section.panel.active{display:block;animation:fadeUp .35s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .section-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
  .section-head h2{font-size:24px;margin:0;}
  .section-head p{margin:4px 0 0;color:var(--cream-dim);font-size:13.5px;}
  .btn{cursor:pointer;border:1.5px solid rgba(122,31,46,.35);background:rgba(122,31,46,.07);color:var(--pink);padding:9px 16px;border-radius:12px;font-size:13px;font-weight:800;font-family:inherit;transition:.2s;white-space:nowrap;}
  .btn:hover{background:rgba(122,31,46,.14);border-color:var(--pink);}
  .btn:hover{border-color:var(--pink);}
  .btn.primary{background:var(--gold);color:var(--ink);border-color:transparent;}
  .btn.ghost{background:transparent;border-color:rgba(122,31,46,.55);}
  .btn.small{padding:6px 12px;font-size:12px;}
  .btn.danger{border-color:rgba(140,31,46,.4);background:rgba(140,31,46,.10);color:#8C2438;}
  .btn.danger:hover{background:#8C2438;border-color:#8C2438;color:#fff;}

  .timeline{position:relative;padding-left:26px;}
  .timeline:before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--gold);opacity:.35;}
  .t-item{position:relative;margin-bottom:16px;background:var(--card);border:1px solid var(--card-border);border-radius:18px;padding:16px 18px;}
  .t-item:before{content:"";position:absolute;left:-26px;top:20px;width:13px;height:13px;border-radius:50%;background:var(--bg);border:2px solid var(--violet);}
  .t-item.done:before{background:var(--gold);border-color:transparent;}
  .t-item.done{opacity:.68;}
  .t-row{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;align-items:flex-start;}
  .t-left{flex:1;min-width:200px;}
  .t-cat{display:inline-block;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);font-weight:700;margin-bottom:6px;}
  .t-title{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin:0 0 4px;background:none !important;border:none;color:var(--cream);width:100%;padding:0;}
  .t-title:disabled{opacity:1;-webkit-text-fill-color:var(--cream);}
  .t-desc{font-size:13.5px;color:var(--cream-dim);margin:2px 0 8px;border:none;background:none !important;width:100%;resize:none;font-family:inherit;line-height:1.4;padding:0;}
  .t-desc:disabled{opacity:1;-webkit-text-fill-color:var(--cream-dim);}
  .t-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:6px;}
  .t-date{font-size:12.5px;color:var(--cream-dim);background:rgba(122,31,46,.06);border:1px solid var(--card-border);border-radius:10px;padding:5px 10px;}
  .t-date input{background:transparent;border:none;color:var(--cream);font-family:inherit;font-size:12.5px;}
  .t-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
  .chip{font-size:11.5px;padding:5px 11px;border-radius:100px;font-weight:700;border:1px solid transparent;}
  .chip.upcoming{background:rgba(122,31,46,.10);color:var(--cream-dim);}
  .chip.done{background:rgba(212,175,55,.22);color:#7A5B12;}
  .confirm-toggle{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--cream-dim);cursor:pointer;}
  .row-actions{display:flex;gap:6px;}

  .vendor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
  .v-card{background:var(--card);border:1px solid var(--card-border);border-radius:20px;padding:16px 18px;position:relative;}
  .v-card .v-cat{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;justify-content:space-between;flex-wrap:wrap;}
  .v-card .v-cat .catleft{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
  .v-card .v-cat .emoji{font-size:19px;flex-shrink:0;}
  .v-card .v-cat [data-action="delete-vendor"]{flex-shrink:0;white-space:nowrap;}
  .v-emoji-input{width:40px;text-align:center;font-size:18px;padding:3px 2px;border-radius:8px;background:transparent;border:1px dashed var(--card-border);flex-shrink:0;}
  .v-emoji-input:focus{border-style:solid;}
  .v-card .v-cat input.catname{font-family:'Fraunces',serif;font-size:16px;font-weight:600;background:transparent;border:none;border-bottom:1px dashed var(--card-border);padding:0 0 2px;min-width:0;flex:1;}
  .v-field{margin-bottom:8px;}
  .v-field label{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--cream-dimmer);display:block;margin-bottom:3px;}
  .v-field input, .v-field textarea, .v-field select{width:100%;background:rgba(122,31,46,.05);border:1px solid var(--card-border);border-radius:9px;color:var(--cream);padding:7px 9px;font-family:inherit;font-size:13px;}
  .v-field textarea{resize:none;min-height:44px;-webkit-appearance:none;}
  .v-field textarea::-webkit-resizer{display:none;}
  .v-field input:disabled,.v-field textarea:disabled,.v-field select:disabled{opacity:.85;background:transparent;border-color:transparent;padding-left:0;}

  .subsection{margin-top:12px;padding-top:12px;border-top:1px dashed var(--card-border);}
  .subsection h4{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--cream-dim);display:flex;align-items:center;gap:6px;}
  .mini-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
  .mini-item{display:flex;align-items:center;gap:8px;background:rgba(122,31,46,.04);border:1px solid var(--card-border);border-radius:12px;padding:8px 10px;font-size:12.5px;}
  .mini-item .mi-check{flex-shrink:0;}
  .mini-item .mi-body{flex:1;min-width:0;}
  .mini-item .mi-text{margin-bottom:3px;}
  .mini-item.done .mi-text{text-decoration:line-through;color:var(--cream-dimmer);}
  .mini-item .mi-date{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--cream-dimmer);}
  .mini-item .mi-date input{font-size:11px;padding:2px 5px;border-radius:6px;background:rgba(122,31,46,.05);}
  .mini-item input[type=checkbox]{accent-color:var(--pink);width:16px;height:16px;}
  .mini-item .mi-price{color:var(--gold);font-weight:700;white-space:nowrap;}
  .mi-del{width:24px;height:24px;min-width:24px;border-radius:50%;background:rgba(122,31,46,.12);border:1px solid rgba(122,31,46,.22);color:var(--pink);cursor:pointer;font-size:12px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;line-height:1;transition:.2s;padding:0;}
  .mi-del:hover{background:var(--pink);color:#fff;border-color:var(--pink);transform:scale(1.06);}
  .mini-add{display:flex;gap:8px;align-items:center;}
  .mini-add input{flex:1;min-width:0;font-size:12.5px;padding:8px 10px;border-radius:10px;}
  .mini-add input.price{max-width:110px;}
  .mini-add-btn{width:36px;height:36px;min-width:36px;border-radius:50%;background:var(--gold);color:var(--ink);border:none;font-size:19px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;line-height:1;transition:.2s;}
  .mini-add-btn:hover{filter:brightness(1.08);transform:scale(1.05);}
  .empty-mini{font-size:12px;color:var(--cream-dimmer);padding:4px 0;}
  .addon-total-badge{color:var(--gold);font-weight:700;font-size:11.5px;}

  .extra-vendor-head{display:flex;justify-content:space-between;align-items:center;margin:26px 0 14px;}

  .pay-summary{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
  .pay-item{flex:1;min-width:170px;background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:14px 16px;}
  .pay-item.highlight{border-color:var(--pink);}
  .pay-item .lbl{font-size:11.5px;color:var(--cream-dim);}
  .pay-item .val{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-top:4px;}
  .pay-item-package{min-width:220px;}
  .pay-item-package .pkg-name{font-size:13px;font-weight:700;color:var(--gold);margin-top:3px;white-space:normal;overflow-wrap:break-word;word-break:break-word;line-height:1.3;}
  .pay-item input.currency{width:100%;background:transparent;border:none;border-bottom:1px dashed var(--card-border);color:var(--cream);font-family:'Fraunces',serif;font-size:20px;font-weight:600;padding:2px 0;}
  .pay-list .p-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:12px 16px;margin-bottom:10px;flex-wrap:wrap;}
  .p-row .p-main{flex:1;min-width:170px;}
  .p-row .p-title{font-weight:700;font-size:14.5px;background:transparent;border:none;width:100%;padding:0;font-family:inherit;}
  .p-row .p-title:disabled{opacity:1;-webkit-text-fill-color:var(--cream);}
  .p-row .p-due{font-size:12px;color:var(--cream-dim);display:flex;align-items:center;gap:6px;margin-top:4px;}
  .p-row .p-due input{font-size:12px;background:rgba(122,31,46,.05);border:1px solid var(--card-border);border-radius:8px;padding:3px 6px;}
  .p-row input.amt{width:190px;min-width:130px;max-width:100%;flex-shrink:0;font-weight:700;color:var(--gold);text-align:right;border-radius:9px;padding:7px 9px;box-sizing:border-box;}

<script>
/* Storage backend for when this file runs outside Claude.ai (e.g. hosted on
   Netlify, opened directly from disk). Claude.ai's artifact preview injects
   a real window.storage backed by the cloud; everywhere else we shim the
   same get/set/delete/list API. If APPS_SCRIPT_URL below is filled in, all
   reads/writes go to a Google Sheet (real-time, shared across every device).
   If it's left empty, falls back to this browser's localStorage only. */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzpcNR_iq-FgwN6UUUy-5R0nYCNFvJSJAtuEUTj6qV_RYL7YMaYuK0JxiPEktb-tYe36w/exec';

if(!window.storage){
  if(APPS_SCRIPT_URL){
    window.storage = {
      async get(key, shared){
        const url = `${APPS_SCRIPT_URL}?action=get&key=${encodeURIComponent(key)}&shared=${!!shared}`;
        const res = await fetch(url);
        if(!res.ok) throw new Error('storage.get HTTP ' + res.status);
        return await res.json(); // null is a legitimate "key not found" result
      },
      async set(key, value, shared){
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'set', key, value, shared: !!shared })
        });
        if(!res.ok) throw new Error('storage.set HTTP ' + res.status);
        const data = await res.json();
        if(!data || data.error) throw new Error('storage.set failed: ' + (data && data.error));
        return data;
      },
      async delete(key, shared){
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'delete', key, shared: !!shared })
        });
        if(!res.ok) throw new Error('storage.delete HTTP ' + res.status);
        return await res.json();
      },
      async list(prefix, shared){
        const url = `${APPS_SCRIPT_URL}?action=list&prefix=${encodeURIComponent(prefix || '')}&shared=${!!shared}`;
        const res = await fetch(url);
        if(!res.ok) throw new Error('storage.list HTTP ' + res.status);
        return await res.json();
      }
    };
  } else {
    const nsKey = (key, shared) => (shared ? 'shared__' : 'priv__') + key;
    window.storage = {
      async get(key, shared){
        try{
          const raw = localStorage.getItem(nsKey(key, shared));
          if(raw === null) return null;
          return { key, value: raw, shared: !!shared };
        }catch(e){ return null; }
      },
      async set(key, value, shared){
        try{
          localStorage.setItem(nsKey(key, shared), value);
          return { key, value, shared: !!shared };
        }catch(e){ return null; }
      },
      async delete(key, shared){
        try{
          localStorage.removeItem(nsKey(key, shared));
          return { key, deleted: true, shared: !!shared };
        }catch(e){ return null; }
      },
      async list(prefix, shared){
        try{
          const p = nsKey(prefix || '', shared);
          const keys = [];
          for(let i=0;i<localStorage.length;i++){
            const k = localStorage.key(i);
            if(k && k.indexOf(p) === 0) keys.push(k.slice(p.length - (prefix||'').length));
          }
          return { keys, prefix, shared: !!shared };
        }catch(e){ return null; }
      }
    };
  }
}
const APP_VERSION = 'v4';
const PROJECTS_INDEX_KEY = 'wedding_projects_index_' + APP_VERSION;
const MASTER_SETTINGS_KEY = 'wedding_master_settings_' + APP_VERSION;
const MARKETING_LIST_KEY = 'wedding_marketing_list_' + APP_VERSION;
const PACKAGE_LIST_KEY = 'wedding_package_list_' + APP_VERSION;
const CUSTOM_VENDOR_CATS_KEY = 'wedding_custom_vendor_cats_' + APP_VERSION;
function projectKey(id){ return 'wedding_project_' + APP_VERSION + '_' + id; }
/* File invoice TIDAK ikut disimpan menempel di dalam data project (state).
   Kalau ditempel, satu blok data project (tamu+jadwal+pembayaran+dll jadi satu)
   gampang kelewat batas ukuran storage backend (45000 karakter) begitu ada
   invoice foto/PDF. Jadi file invoice disimpan di key terpisah per pembayaran,
   dan hanya metadata ringan (nama, tipe) yang tersimpan di state.
   invoiceFileCache menyimpan isi file invoice untuk project yang lagi dibuka,
   sengaja TIDAK ditempelkan ke object `state` supaya tidak ikut ter-save ulang. */
function invoiceFileKey(projectId, paymentId){ return 'inv_file_' + projectId + '_' + paymentId; }
let invoiceFileCache = {};
async function hydrateInvoiceAttachments(){
  invoiceFileCache = {};
  if(!state || !Array.isArray(state.payments)) return;
  let needsResave = false;
  await Promise.all(state.payments.filter(p=>p.invoice).map(async p=>{
    if(p.invoice.dataUrl){
      // Data lama: dataUrl masih nempel di state (format sebelum perbaikan ini) — migrasikan ke key terpisah.
      invoiceFileCache[p.id] = p.invoice.dataUrl;
      try{ await storageSetWithRetry(invoiceFileKey(state.id, p.id), p.invoice.dataUrl, true); }catch(e){ /* kalau gagal, biarkan tetap di state supaya tidak hilang */ return; }
      p.invoice = { name: p.invoice.name, type: p.invoice.type };
      needsResave = true;
      return;
    }
    try{
      const res = await window.storage.get(invoiceFileKey(state.id, p.id), true);
      if(res && res.value) invoiceFileCache[p.id] = res.value;
    }catch(e){ /* biarkan kosong kalau gagal ambil, link invoice tidak akan tampil */ }
  }));
  if(needsResave) scheduleSave();
}

/* ---------- STATUS PROJECT (otomatis, hanya terlihat oleh admin & marketing) ----------
   Dihitung dari status pembayaran (DP1 / DP20 / Pelunasan), tanggal hari H, dan progres agenda.
   Ringkasan (dp1Paid/dp20Paid/pelunasanPaid/allAgendaDone) disimpan di projectsIndex tiap kali
   project disimpan, supaya dashboard tidak perlu memuat data lengkap tiap project satu-satu. */
function computePaymentFlags(payments){
  const list = Array.isArray(payments) ? payments : [];
  const findPay = kw => list.find(p => (p.label||'').toLowerCase().includes(kw));
  const dp1 = findPay('dp 1');
  const dp20 = findPay('dp 20');
  const pelunasan = findPay('pelunasan');
  const totalPaid = list.filter(p=>p.status==='paid').reduce((s,p)=>s+(Number(p.amount)||0),0);
  const totalTagihan = list.reduce((s,p)=>s+(Number(p.amount)||0),0);
  return {
    dp1Paid: !!(dp1 && dp1.status==='paid'),
    dp20Paid: !!(dp20 && dp20.status==='paid'),
    pelunasanPaid: !!(pelunasan && pelunasan.status==='paid') || (totalTagihan>0 && totalPaid>=totalTagihan),
  };
}
function computeAllAgendaDone(timeline){
  const list = Array.isArray(timeline) ? timeline : [];
  return list.length>0 && list.every(t=>t.status==='done');
}
const STAGE_LABELS = {
  belum_dp: 'Belum DP',
  dp1: 'Sudah DP 1jt',
  on_progress: 'On Progress',
  lunas: 'Lunas',
  menunggu_album: 'Menunggu Album',
  final: 'Final',
};
function computeProjectStage(entry){
  entry = entry || {};
  if(entry.allAgendaDone) return {key:'final', label:STAGE_LABELS.final};
  if(entry.weddingDate && todayISO() > entry.weddingDate) return {key:'menunggu_album', label:STAGE_LABELS.menunggu_album};
  if(entry.pelunasanPaid) return {key:'lunas', label:STAGE_LABELS.lunas};
  if(entry.dp20Paid) return {key:'on_progress', label:STAGE_LABELS.on_progress};
  if(entry.dp1Paid) return {key:'dp1', label:STAGE_LABELS.dp1};
  return {key:'belum_dp', label:STAGE_LABELS.belum_dp};
}

async function loadCustomVendorCats(){
  try{
    const res = await window.storage.get(CUSTOM_VENDOR_CATS_KEY, true);
    const extra = (res && res.value) ? JSON.parse(res.value) : [];
    extra.forEach(c=>{
      if(c && c.key && !VENDOR_CATS.some(vc=>vc.key.toLowerCase()===c.key.toLowerCase())){
        VENDOR_CATS.push({key:c.key, emoji:c.emoji||'⭐'});
      }
    });
  }catch(e){ /* ignore, pakai kategori bawaan saja */ }
}
async function saveCustomVendorCats(){
  const extra = VENDOR_CATS.filter(c=> !BUILTIN_VENDOR_CAT_KEYS.has(c.key)).map(c=>({key:c.key, emoji:c.emoji}));
  return await storageSetWithRetry(CUSTOM_VENDOR_CATS_KEY, JSON.stringify(extra), true);
}

function normalizeState(s){
  if(!s.id) s.id = uid('proj');

  if(typeof s.packageId === 'undefined') s.packageId = null;

    if(!v.addons) v.addons = [];
    if(!v.progress) v.progress = [];
    if(!Array.isArray(v.packageItems)) v.packageItems = [];

    v.progress.forEach(p=>{ if(!p.date) p.date = todayISO(); });
    v.addons.forEach(a=>{
      if(typeof a.qty !== 'number') a.qty = 1;
      if(typeof a.amount !== 'number'){ a.amount = typeof a.price === 'number' ? a.price : (parseInt(digitsOnly(a.price),10) || 0); }

  // migrate familyPhotos from old flat list shape to {cpw:{photoUrl,members},cpp:{photoUrl,members}}

/* Kompres gambar di browser (resize + turunkan kualitas JPEG) sampai hasilnya
   pasti muat di bawah batas ukuran storage backend (default aman: 40000 karakter,
   backend membatasi 45000). Ini mencegah error "Value terlalu besar untuk disimpan"
   yang terjadi kalau foto asli langsung dijadikan base64 tanpa dikompres dulu. */
function compressImageFile(file, opts){
  opts = opts || {};
  const maxChars = opts.maxChars || 40000;
  const maxDim = opts.maxDim || 480;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        try{
          let width = img.width, height = img.height;
          const scale = Math.min(1, maxDim / Math.max(width, height));
          width = Math.max(1, Math.round(width*scale));
          height = Math.max(1, Math.round(height*scale));
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          let quality = 0.85;
          let dataUrl = '';
          let attempts = 0;
          do{
            canvas.width = width; canvas.height = height;
            ctx.clearRect(0,0,width,height);
            ctx.drawImage(img, 0, 0, width, height);
            dataUrl = canvas.toDataURL('image/jpeg', quality);
            if(dataUrl.length <= maxChars) break;
            // Kalau masih kegedean: turunkan kualitas dulu, kalau sudah mentok turunkan dimensi.
            if(quality > 0.35){ quality -= 0.1; }
            else { width = Math.max(24, Math.round(width*0.85)); height = Math.max(24, Math.round(height*0.85)); }
            attempts++;
          } while(attempts < 18);
          resolve(dataUrl);
        }catch(err){ reject(err); }
      };
      img.onerror = ()=> reject(new Error('Gagal membaca gambar. Coba format JPG/PNG lain.'));
      img.src = reader.result;
    };
    reader.onerror = ()=> reject(new Error('Gagal membaca file.'));
    reader.readAsDataURL(file);
  });
}

async function renameProjectCode(newCode){
  newCode = (newCode||'').trim();
  if(!newCode) return {ok:false, msg:'Kode tidak boleh kosong.'};
  if(!/^[a-zA-Z0-9_-]+$/.test(newCode)) return {ok:false, msg:'Kode hanya boleh huruf, angka, - dan _ (tanpa spasi).'};
  if(newCode === state.id) return {ok:true};
  await loadProjectsIndex();
  if(projectsIndex.some(p=>p.id===newCode)) return {ok:false, msg:'Kode ini sudah dipakai project lain, coba kode lain.'};
  const oldId = state.id;
  const oldKey = projectKey(oldId);
  state.id = newCode;
  const ok = await storageSetWithRetry(projectKey(newCode), JSON.stringify(state), true);
  if(!ok){ state.id = oldId; return {ok:false, msg:'Gagal menyimpan kode baru, coba lagi.'}; }
  try{ await window.storage.delete(oldKey, true); }catch(e){}
  const idxEntry = projectsIndex.find(p=>p.id===oldId);
  if(idxEntry) idxEntry.id = newCode;
  await saveProjectsIndex();
  currentProjectId = newCode;
  history.replaceState(null, '', location.pathname + '?p=' + newCode);
  return {ok:true};
}

let saveTimer = null;
function scheduleSave(){ clearTimeout(saveTimer); saveTimer = setTimeout(persist, 400); }
let lastStorageError = '';
async function storageSetWithRetry(key, value, shared, retries){
  retries = retries==null ? 2 : retries;
  let lastErr;
  for(let i=0;i<=retries;i++){
    try{ await window.storage.set(key, value, shared); lastStorageError = ''; return true; }
    catch(e){ lastErr = e; if(i<retries) await new Promise(r=>setTimeout(r, 600*(i+1))); }
  }
  lastStorageError = (lastErr && (lastErr.message || String(lastErr))) || 'Unknown error';
  console.error('storage set failed after retries', lastErr);
  return false;
}
async function persist(){
  if(!state || !state.id) return;
  const ok = await storageSetWithRetry(projectKey(state.id), JSON.stringify(state), true);
  if(ok){
    showToast(isVendor ? 'Tersimpan ✓' : 'Terkirim ke vendor ✓');
    const idxEntry = projectsIndex.find(p=>p.id===state.id);
    if(idxEntry){
      idxEntry.brideName = state.couple.brideName;
      idxEntry.groomName = state.couple.groomName;
      idxEntry.weddingDate = state.couple.weddingDate;
      Object.assign(idxEntry, computePaymentFlags(state.payments));
      idxEntry.allAgendaDone = computeAllAgendaDone(state.timeline);
      saveProjectsIndex();
    }
  } else {
    showToast('⚠️ Gagal menyimpan — cek koneksi & coba edit lagi', true);
  }
}
function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  t.classList.toggle('error', !!isError);
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), isError ? 3200 : 1600);
}

/* ---------- CUSTOM MODAL (native confirm/prompt/alert are blocked inside the sandboxed artifact iframe, so we build our own) ---------- */
function customModal(opts){
  opts = opts || {};
  return new Promise(resolve=>{
    const overlay = document.getElementById('modalOverlay');
    const msg = document.getElementById('modalMsg');
    const input = document.getElementById('modalInput');
    const actions = document.getElementById('modalActions');
    msg.textContent = opts.message || '';
    if(opts.showInput){ input.style.display='block'; input.value = opts.inputValue || ''; }
    else { input.style.display='none'; }
    actions.innerHTML = '';
    const cleanup = (val)=>{ overlay.classList.remove('show'); resolve(val); };
    if(!opts.onlyOk){
      const cancelBtn = document.createElement('button');
      cancelBtn.className='btn ghost'; cancelBtn.textContent = opts.cancelText || 'Batal';
      cancelBtn.type='button';
      cancelBtn.addEventListener('click', ()=> cleanup(opts.showInput ? null : false));
      actions.appendChild(cancelBtn);
    }
    const okBtn = document.createElement('button');
    okBtn.className='btn primary'; okBtn.textContent = opts.okText || 'OK';
    okBtn.type='button';
    okBtn.addEventListener('click', ()=> cleanup(opts.showInput ? input.value : true));
    actions.appendChild(okBtn);
    overlay.classList.add('show');
    if(opts.showInput){
      setTimeout(()=>{ input.focus(); input.select(); }, 50);
      input.onkeydown = e=>{ if(e.key==='Enter') okBtn.click(); else if(e.key==='Escape') cancelBtn && cancelBtn.click(); };
    }
  });
}
function customConfirm(message){ return customModal({message, okText:'Ya, Lanjutkan', cancelText:'Batal'}); }
function customPrompt(message, defVal){ return customModal({message, showInput:true, inputValue:defVal, okText:'Simpan', cancelText:'Batal'}); }
function customAlert(message){ return customModal({message, onlyOk:true, okText:'OK'}); }

function digitsOnly(str){ return String(str||'').replace(/[^0-9]/g,''); }
function fmtIDR(n){ n = Number(n)||0; return 'Rp ' + n.toLocaleString('id-ID'); }
function fmtDate(iso){ if(!iso) return '-'; const d = new Date(iso+'T00:00:00'); return d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}); }
function fmtDateShort(iso){ if(!iso) return '-'; const d = new Date(iso+'T00:00:00'); return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }
function daysUntil(iso){ const now = new Date(); now.setHours(0,0,0,0); const d = new Date(iso+'T00:00:00'); return Math.round((d-now)/86400000); }
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast('Disalin ✓')).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text){
  try{
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Disalin ✓');
  }catch(e){ showToast('Gagal auto-copy, salin manual ya'); }
}

function addonTotal(a){ return (Number(a.qty)||0) * (Number(a.amount)||0); }
function totalAddonsForVendor(v){ return (v.addons||[]).reduce((s,a)=>s+addonTotal(a),0); }
function activeVendorCats(){ return VENDOR_CATS.filter(c=> !(state.removedVendorCats||[]).includes(c.key)); }
function totalAddonsAll(){
  let sum = 0;
  activeVendorCats().forEach(c=> sum += totalAddonsForVendor(state.vendors[c.key]));
  state.extraVendors.forEach(v=> sum += totalAddonsForVendor(v));
  return sum;
}
function totalVendorHarga(){
  let sum = 0;
  activeVendorCats().forEach(c=> sum += Number(state.vendors[c.key].price)||0);
  state.extraVendors.forEach(v=> sum += Number(v.price)||0);
  return sum;
}

function refreshPaymentSummary(){
  const totalHarga = totalVendorHarga();
  const totalAddons = totalAddonsAll();
  const packageHarga = Number(state.budget)||0;
  const totalKontrak = totalHarga + totalAddons + packageHarga;
  const dp20 = Math.round(packageHarga * 0.2);
  const totalPaid = state.payments.filter(p=>p.status==='paid').reduce((s,p)=>s+(Number(p.amount)||0),0);
  const sisaTagihan = Math.max(totalKontrak - totalPaid, 0);
  const setText = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };
  setText('packageHargaVal', fmtIDR(packageHarga));
  setText('totalHargaVendorVal', fmtIDR(totalHarga));
  setText('totalAddonsVal', fmtIDR(totalAddons));
  setText('totalKontrakVal', fmtIDR(totalKontrak));
  setText('dp20Val', fmtIDR(dp20));
  setText('totalPaidVal', fmtIDR(totalPaid));
  setText('sisaTagihanVal', fmtIDR(sisaTagihan));
}

/* ---------- VENDOR/ADMIN PROJECT DASHBOARD ---------- */
async function showProjectDashboard(){
  viewingDashboard = true;
  roleDecided = false;
  await Promise.all([loadProjectsIndex(), loadMarketingList()]);
  renderProjectDashboard();
}

function myVisibleProjects(){
  const sorted = [...projectsIndex].sort((a,b)=> new Date(b.createdAt)-new Date(a.createdAt));
  if(isAdmin) return sorted;
  if(currentMarketing) return sorted.filter(p => p.marketingId === currentMarketing.id);
  return sorted;
}

function roleChipHtml(){
  if(isAdmin){
    return `<div class="pic-chip"><div class="pic-info"><div class="pic-name">🛡️ Admin</div><div class="pic-role">Akses penuh ke semua project &amp; marketing</div></div></div>`;
  }
  if(currentMarketing){
    const photo = currentMarketing.photoUrl || LOGO_SRC;
    return `<div class="pic-chip"><img class="pic-avatar" src="${photo}" alt="${escapeHtml(currentMarketing.name)}"/><div class="pic-info"><div class="pic-name">${escapeHtml(currentMarketing.name)}</div><div class="pic-role">Marketing · ${escapeHtml(currentMarketing.phone||'-')}</div></div></div>`;
  }
  return '';
}

function projectCardHtml(p){
  const m = p.marketingId ? findMarketingById(p.marketingId) : null;
  const marketingBadge = isAdmin
    ? `<div class="v-field"><label>Marketing</label>
        <select data-action="reassign-marketing" data-id="${p.id}" style="width:100%;">
          <option value="">— Belum ditugaskan —</option>
          ${marketingList.map(mk=>`<option value="${mk.id}" ${p.marketingId===mk.id?'selected':''}>${escapeHtml(mk.name)}</option>`).join('')}
        </select>
      </div>`
    : (m ? `<div class="v-field"><label>Marketing</label><div>${escapeHtml(m.name)}</div></div>` : '');
  const stage = computeProjectStage(p);
  return `
        <div class="v-card">
          <span class="stage-badge v-status-badge ${stage.key}" title="Status: ${stage.label}">${stage.label}</span>
          <div class="v-cat" style="padding-right:88px;"><div class="catleft"><span class="emoji">💍</span><span>${escapeHtml(p.brideName)} &amp; ${escapeHtml(p.groomName)}</span></div></div>
          <div class="v-field"><label>Tanggal Nikah</label><div>${fmtDate(p.weddingDate)}</div></div>
          <div class="v-field"><label>Kode Project</label><div style="font-family:monospace;font-weight:700;">${escapeHtml(p.id)}</div></div>
          ${marketingBadge}
          <div class="row-actions" style="margin-top:10px;">
            <button class="btn small primary" data-action="open-project" data-id="${p.id}">Buka →</button>
            <button class="btn small danger" data-action="delete-project" data-id="${p.id}">🗑️ Hapus</button>
          </div>
        </div>
  `;
}

function renderProjectDashboard(){
  const app = document.getElementById('app');
  const myList = myVisibleProjects();
  app.innerHTML = `
    <div class="topbar">
      <div class="brand"><img src="${LOGO_SRC}" alt="ArtaJava Wedding Organizer"/></div>
      <div class="topbar-right">
        ${roleChipHtml()}
        ${isAdmin ? `<button class="btn tiny ghost" id="changeMasterPin">🔑 Ganti PIN Admin</button>` : ''}
        ${(!isAdmin && currentMarketing) ? `<button class="btn tiny ghost" id="changeMyPin">🔑 Ganti PIN Saya</button>` : ''}
        <button class="btn tiny ghost" id="logoutRoleBtn">Keluar</button>
      </div>
    </div>
    <div class="section-head">
      <div><h2>${isAdmin ? 'Semua Project' : 'Project Klien Kamu'}</h2><p>${isAdmin ? 'Kelola semua wedding project & tim marketing di satu tempat.' : 'Klien yang kamu buat lewat link marketing kamu sendiri.'}</p></div>
      <button class="btn primary" id="newProjectBtn">+ Project Baru</button>
    </div>
    ${isAdmin ? `
    <div class="linkpanel">
      <div class="lp-title">Link Khusus Tim Marketing</div>
      <div class="lp-row">
        <span class="lp-label">Link Marketing</span>
        <input class="lp-input" id="marketingLinkBox" readonly value="${escapeAttr(location.href.split('?')[0].split('#')[0] + '#marketing')}"/>
        <button class="btn small" id="copyMarketingLink">📋 Salin</button>
      </div>
      <div class="lp-note">Kirim link ini ke tim marketing kamu — halaman login lewat link ini <b>tidak menampilkan opsi "Saya Admin"</b>, jadi mereka cuma bisa masuk lewat PIN Marketing atau sebagai Klien.</div>
    </div>
    ` : ''}
    <div id="projectList" class="vendor-grid">
      ${myList.length ? myList.map(projectCardHtml).join('') : `<div class="empty-mini">Belum ada project. Klik "+ Project Baru" buat mulai.</div>`}
    </div>
    ${isAdmin ? `
    <div class="extra-vendor-head"><h2>Paket Vendor</h2><button class="btn primary small" id="newPackageBtn">+ Tambah Paket</button></div>
    <div id="packageListBox" class="vendor-grid">
      ${packageList.length ? packageList.map(packageCardHtml).join('') : `<div class="empty-mini">Belum ada paket. Bikin dulu di sini, nanti tinggal dipilih tiap bikin project baru.</div>`}
    </div>
    ` : ''}
    ${isAdmin ? `
    <div class="extra-vendor-head"><h2>Tim Marketing</h2><button class="btn primary small" id="newMarketingBtn">+ Tambah Marketing</button></div>
    <div id="marketingList" class="vendor-grid">
      ${marketingList.length ? marketingList.map(marketingCardHtml).join('') : `<div class="empty-mini">Belum ada akun marketing. Tambahkan supaya mereka bisa punya link klien sendiri-sendiri.</div>`}
    </div>
    ` : ''}
  `;
  document.getElementById('newProjectBtn').addEventListener('click', ()=> showNewProjectForm());
  const copyMarketingLinkBtn = document.getElementById('copyMarketingLink');
  if(copyMarketingLinkBtn) copyMarketingLinkBtn.addEventListener('click', ()=> copyText(document.getElementById('marketingLinkBox').value));
  document.getElementById('logoutRoleBtn').addEventListener('click', ()=>{
    // Kalau tadi masuk lewat link khusus marketing (#marketing), pertahankan hash itu
    // supaya setelah keluar, opsi "Saya Admin" tetap tidak ditampilkan.
    const keepHash = location.hash === '#marketing' ? '#marketing' : '';
    isVendor=false; isAdmin=false; vendorAuthed=false; currentMarketing=null; viewingDashboard=false; roleDecided=false;
    currentProjectId = null; state = null;
    history.replaceState(null, '', location.pathname + keepHash);
    showEntryGate();
  });
  if(isAdmin){
    document.getElementById('changeMasterPin').addEventListener('click', async ()=>{
      const val = await customPrompt('PIN Admin baru:', masterSettings.vendorPin);
      if(val && val.trim()){
        const oldPin = masterSettings.vendorPin;
        masterSettings.vendorPin = val.trim();
        const ok = await saveMasterSettings();
        if(ok) showToast('PIN admin diperbarui ✓');
        else { masterSettings.vendorPin = oldPin; await customAlert('Gagal menyimpan PIN baru ke storage — cek koneksi internet dan coba lagi.'); }
      }
    });
    document.getElementById('newMarketingBtn').addEventListener('click', ()=> showMarketingForm());
    document.getElementById('newPackageBtn').addEventListener('click', ()=> showPackageForm());
    document.querySelectorAll('[data-action="edit-package"]').forEach(btn=> btn.addEventListener('click', ()=> showPackageForm(btn.dataset.id)));
    document.querySelectorAll('[data-action="delete-package"]').forEach(btn=> btn.addEventListener('click', async ()=>{
      if(await customConfirm('Hapus paket ini? Project yang sudah dibuat pakai paket ini tidak akan berubah.')){
        packageList = packageList.filter(pk=>pk.id!==btn.dataset.id);
        await savePackageList();
        renderProjectDashboard();
      }
    }));
    document.querySelectorAll('[data-action="reassign-marketing"]').forEach(sel=> sel.addEventListener('change', async ()=>{
      const pid = sel.dataset.id;
      const newMid = sel.value || null;
      const idx = projectsIndex.find(p=>p.id===pid);
      if(idx){ idx.marketingId = newMid; await saveProjectsIndex(); }
      const proj = await loadProjectById(pid);
      if(proj){ proj.marketingId = newMid; await storageSetWithRetry(projectKey(pid), JSON.stringify(proj), true); }
      showToast('Marketing project diperbarui ✓');
      renderProjectDashboard();
    }));
    document.querySelectorAll('[data-action="edit-marketing"]').forEach(btn=> btn.addEventListener('click', ()=> showMarketingForm(btn.dataset.id)));
    document.querySelectorAll('[data-action="delete-marketing"]').forEach(btn=> btn.addEventListener('click', async ()=>{
      if(await customConfirm('Hapus akun marketing ini? Project yang sudah ditugaskan ke dia akan jadi "Belum ditugaskan".')){
        const mid = btn.dataset.id;
        marketingList = marketingList.filter(m=>m.id!==mid);
        await saveMarketingList();
        await deleteMarketingPhoto(mid);
        for(const p of projectsIndex.filter(p=>p.marketingId===mid)){
          p.marketingId = null;
          const proj = await loadProjectById(p.id);
          if(proj){ proj.marketingId = null; await storageSetWithRetry(projectKey(p.id), JSON.stringify(proj), true); }
        }
        await saveProjectsIndex();
        renderProjectDashboard();
      }
    }));
  }
  const changeMyPinBtn = document.getElementById('changeMyPin');
  if(changeMyPinBtn) changeMyPinBtn.addEventListener('click', async ()=>{
    const newPin = await customPrompt('PIN baru kamu:', currentMarketing.pin);
    if(!newPin || !newPin.trim()) return;
    const trimmed = newPin.trim();
    await loadMarketingList();
    const me = findMarketingById(currentMarketing.id);
    if(!me){ await customAlert('Akun kamu tidak ditemukan lagi — mungkin sudah dihapus admin. Hubungi admin ya.'); return; }
    if(marketingList.some(m => m.pin===trimmed && m.id!==me.id)){ await customAlert('PIN ini sudah dipakai marketing lain, pakai PIN lain.'); return; }
    const oldPin = me.pin;
    me.pin = trimmed;
    const ok = await saveMarketingList();
    if(ok){ currentMarketing = me; showToast('PIN kamu diperbarui ✓'); }
    else { me.pin = oldPin; await customAlert('Gagal menyimpan PIN baru ke storage. PIN belum berubah.\n\nDetail: ' + (lastStorageError || 'tidak diketahui')); }
  });
  document.querySelectorAll('[data-action="open-project"]').forEach(btn=> btn.addEventListener('click', async ()=>{
    // Buka project langsung sesuai peran yang sedang login (admin/marketing) tanpa
    // reload halaman & tanpa minta PIN lagi — role (isAdmin/isVendor/currentMarketing)
    // yang sudah login di dashboard ini dipakai apa adanya.
    const id = btn.dataset.id;
    btn.disabled = true;
    const proj = await loadProjectById(id);
    if(!proj){ btn.disabled = false; await customAlert('Project tidak ditemukan atau gagal dimuat.'); return; }
    currentProjectId = id;
    state = proj;
    await hydrateInvoiceAttachments();
    viewingDashboard = false;
    roleDecided = true;
    const baseUrl = location.href.split('?')[0].split('#')[0];
    const hash = location.hash === '#marketing' ? '#marketing' : '';
    history.pushState({}, '', baseUrl + '?p=' + id + hash);
    render();
  }));
  document.querySelectorAll('[data-action="delete-project"]').forEach(btn=> btn.addEventListener('click', async ()=>{
    if(await customConfirm('Hapus project ini beserta semua datanya? Tindakan ini tidak bisa dibatalkan.')){
      await deleteProject(btn.dataset.id);
      renderProjectDashboard();
    }
  }));
}

    if(file.size > 4*1024*1024){ await customAlert('Ukuran foto maksimal 4MB.'); e.target.value=''; return; }
    try{
      photoDraft = await compressImageFile(file, { maxChars: 40000, maxDim: 480 });
      document.getElementById('mktPhotoPreview').src = photoDraft;
    }catch(err){
      await customAlert('Gagal memproses foto: ' + (err.message || err));
      e.target.value = '';
    }
  });
  document.getElementById('cancelMktForm').addEventListener('click', ()=> renderProjectDashboard());
  document.getElementById('saveMktBtn').addEventListener('click', async ()=>{
    const name = document.getElementById('mktName').value.trim();
    const phone = document.getElementById('mktPhone').value.trim();
    const pin = document.getElementById('mktPin').value.trim();
    if(!name || !pin){ await customAlert('Nama dan PIN wajib diisi.'); return; }
    // Selalu cek daftar marketing paling baru dulu, biar gak bentrok PIN dengan perubahan dari sesi lain.
    await loadMarketingList();
    const stillEditing = editing ? findMarketingById(editing.id) : null;
    if(marketingList.some(m => m.pin===pin && m.id!==(stillEditing?stillEditing.id:null))){ await customAlert('PIN ini sudah dipakai marketing lain, pakai PIN lain.'); return; }
    const btn = document.getElementById('saveMktBtn');
    btn.disabled = true; btn.textContent = 'Menyimpan...';
    let targetId;
    if(stillEditing){
      targetId = stillEditing.id;
      stillEditing.name = name; stillEditing.phone = phone; stillEditing.pin = pin; stillEditing.photoUrl = photoDraft;
    } else if(editing){
      // Data lama sudah tidak ada (mungkin terhapus di sesi lain), simpan sebagai akun baru dengan id yang sama.
      targetId = editing.id;
      marketingList.push({ id: targetId, name, phone, pin, photoUrl: photoDraft });
    } else {
      targetId = uid('mkt');
      marketingList.push({ id: targetId, name, phone, pin, photoUrl: photoDraft });
    }
    const ok = await saveMarketingList();
    if(!ok){
      btn.disabled = false; btn.textContent = 'Simpan';
      await customAlert('Gagal menyimpan ke storage. PIN belum berubah.\n\nDetail: ' + (lastStorageError || 'tidak diketahui'));
      return;
    }
    const photoOk = await saveMarketingPhoto(targetId, photoDraft);
    if(!photoOk){
      btn.disabled = false; btn.textContent = 'Simpan';
      await customAlert('Data (nama/telepon/PIN) tersimpan, tapi foto gagal diupload.\n\nDetail: ' + (lastStorageError || 'tidak diketahui'));
      return;
    }
    showToast('Data marketing tersimpan ✓');
    renderProjectDashboard();
  });
}

function showPackageForm(editId, draft){

        <img src="${LOGO_SRC}" class="gate-logo" alt="ArtaJava"/>
        <h2>${editing ? 'Edit Paket' : 'Tambah Paket'}</h2>
        <p>Isi sekali di sini — nanti tinggal dipilih tiap bikin project baru, gak perlu isi ulang.</p>
        <div style="display:flex;flex-direction:column;gap:10px;text-align:left;">
          <input id="pkgName" placeholder="Nama Paket (mis. Paket Silver)" value="${base?escapeAttr(base.name||''):''}" style="padding:12px 14px;border-radius:12px;width:100%;"/>
          <textarea id="pkgNote" placeholder="Catatan/deskripsi paket (opsional)" style="padding:12px 14px;border-radius:12px;width:100%;min-height:60px;">${base?escapeHtml(base.note||''):''}</textarea>
          <div style="font-size:12px;font-weight:700;color:var(--cream-dim);margin-top:4px;">Vendor yang termasuk dalam paket ini:</div>
          <div id="pkgCatsBox" style="display:grid;grid-template-columns:1fr 1fr;gap:7px 14px;max-height:220px;overflow-y:auto;padding:4px 2px;">
            ${VENDOR_CATS.map(c=>`
              <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
                <input type="checkbox" data-cat="${escapeAttr(c.key)}" ${selectedCats.includes(c.key)?'checked':''}/> ${c.emoji} ${escapeHtml(c.key)}
              </label>
            `).join('')}
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <input id="newVendorCatEmoji" placeholder="⭐" maxlength="4" style="width:52px;padding:8px 6px;border-radius:10px;text-align:center;flex-shrink:0;"/>
            <input id="newVendorCatName" placeholder="Nama vendor baru (mis. Wedding Car)" style="flex:1;padding:8px 10px;border-radius:10px;"/>
            <button class="btn small ghost" id="addVendorCatBtn" type="button" style="flex-shrink:0;">+ Tambah Vendor</button>
          </div>
          <div style="font-size:12px;font-weight:700;color:var(--cream-dim);margin-top:8px;">Rincian isi paket per vendor (opsional):</div>
          <div style="font-size:11px;color:var(--cream-dimmer);margin-top:-4px;line-height:1.5;">Isi apa saja yang didapat klien dari tiap vendor. Satu baris = satu item. Ini otomatis muncul di kartu vendor tiap project baru yang pakai paket ini, jadi klien langsung tau isinya tanpa perlu diisi ulang.</div>
          <div id="pkgItemsBox" style="display:flex;flex-direction:column;gap:10px;max-height:280px;overflow-y:auto;padding:4px 2px;">
            ${VENDOR_CATS.map(c=>{
              const existing = (base && base.catItems && base.catItems[c.key]) ? base.catItems[c.key].join('\n') : '';
              return `
              <div class="pkg-item-block" data-catkey="${escapeAttr(c.key)}" style="display:${selectedCats.includes(c.key)?'block':'none'};">
                <div style="font-size:12px;font-weight:700;margin-bottom:4px;">${c.emoji} ${escapeHtml(c.key)}</div>
                <textarea data-catitems="${escapeAttr(c.key)}" placeholder="Satu baris = satu item, misal:&#10;Free 1x retouch foto&#10;Cetak album 20 halaman" style="padding:8px 10px;border-radius:10px;width:100%;min-height:52px;font-size:12.5px;">${escapeHtml(existing)}</textarea>
              </div>`;
            }).join('')}
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:16px;">
          <button class="btn ghost" id="cancelPkgForm" style="flex:1;">Batal</button>
          <button class="btn primary" id="savePkgBtn" style="flex:1;">Simpan</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('cancelPkgForm').addEventListener('click', ()=> renderProjectDashboard());
  document.querySelectorAll('#pkgCatsBox input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      const block = document.querySelector(`#pkgItemsBox .pkg-item-block[data-catkey="${CSS.escape(cb.dataset.cat)}"]`);
      if(block) block.style.display = cb.checked ? 'block' : 'none';
    });
  });
  function collectDraft(){
    return {
      name: document.getElementById('pkgName').value,
      note: document.getElementById('pkgNote').value,
      includedCats: Array.from(document.querySelectorAll('#pkgCatsBox input[type=checkbox]:checked')).map(cb=>cb.dataset.cat),
      catItems: (()=>{
        const items = {};
        VENDOR_CATS.forEach(c=>{
          const ta = document.querySelector(`#pkgItemsBox textarea[data-catitems="${CSS.escape(c.key)}"]`);
          if(ta && ta.value.trim()) items[c.key] = ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
        });
        return items;
      })()
    };
  }
  document.getElementById('addVendorCatBtn').addEventListener('click', async ()=>{
    const nameInp = document.getElementById('newVendorCatName');
    const emojiInp = document.getElementById('newVendorCatEmoji');
    const name = nameInp.value.trim();
    const emoji = emojiInp.value.trim() || '⭐';
    if(!name){ await customAlert('Nama vendor baru wajib diisi.'); return; }
    if(VENDOR_CATS.some(c=>c.key.toLowerCase()===name.toLowerCase())){ await customAlert('Vendor dengan nama ini sudah ada di daftar.'); return; }
    const newDraft = collectDraft();
    VENDOR_CATS.push({key:name, emoji});
    await saveCustomVendorCats();
    newDraft.includedCats.push(name);
    showPackageForm(editId, newDraft);
  });
  document.getElementById('savePkgBtn').addEventListener('click', async ()=>{
    const name = document.getElementById('pkgName').value.trim();
    const note = document.getElementById('pkgNote').value.trim();
    const includedCats = Array.from(document.querySelectorAll('#pkgCatsBox input[type=checkbox]:checked')).map(cb=>cb.dataset.cat);
    const catItems = {};
    includedCats.forEach(key=>{
      const ta = document.querySelector(`#pkgItemsBox textarea[data-catitems="${CSS.escape(key)}"]`);
      const lines = ta ? ta.value.split('\n').map(s=>s.trim()).filter(Boolean) : [];
      if(lines.length) catItems[key] = lines;
    });
    if(!name){ await customAlert('Nama paket wajib diisi.'); return; }
    if(editing){
      editing.name = name; editing.note = note; editing.includedCats = includedCats; editing.catItems = catItems;
    } else {
      packageList.push({ id: uid('pkg'), name, note, includedCats, catItems });
    }
    await savePackageList();
    showToast('Paket tersimpan ✓');
    renderProjectDashboard();
  });
}

function statusColor(s){
  return {
    belum:{bg:'rgba(122,31,46,.08)',fg:'var(--cream-dimmer)'},
    nego:{bg:'rgba(212,175,55,.14)',fg:'#8A6512'},
    dp:{bg:'rgba(140,31,46,.22)',fg:'#8C2438'},
    progres:{bg:'rgba(140,31,46,.32)',fg:'#7A1F2E'},
    lunas:{bg:'rgba(212,175,55,.26)',fg:'#7A5B12'},
    final:{bg:'rgba(212,175,55,.38)',fg:'#6B4E12'},
  }[s] || {bg:'rgba(122,31,46,.08)',fg:'var(--cream-dimmer)'};
}

function escapeHtml(str){ return String(str||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escapeAttr(str){ return String(str||'').replace(/"/g,'&quot;'); }

function getByPath(path){
  return path.split('.').reduce((o,k)=> (o ? o[k] : undefined), state);
}

function renderListSection(path, cols, opts){
  opts = opts || {};
  const editable = opts.vendorOnly ? isVendor : true;
  const arr = getByPath(path) || [];
  return `
    <div class="mini-list" data-listpath="${path}">
      ${arr.length ? arr.map(it=>`
        <div class="mini-item" data-id="${it.id}" data-listpath="${path}">
          <div class="mi-body" style="display:flex;gap:8px;flex-wrap:wrap;">
            ${cols.map(c=>`<input data-field="${c.key}" value="${escapeAttr(it[c.key]||'')}" placeholder="${escapeAttr(c.placeholder)}" style="flex:${c.flex||1};min-width:110px;" ${editable?'':'disabled'}/>`).join('')}
          </div>
          ${editable ? `<button class="mi-del" data-action="delete-listitem">✕</button>` : ''}
        </div>
      `).join('') : `<div class="empty-mini">Belum ada data.</div>`}
    </div>
    ${editable ? `
    <div class="mini-add" data-listpath="${path}">
      ${cols.map(c=>`<input data-col="${c.key}" placeholder="${escapeAttr(c.placeholder)}" style="flex:${c.flex||1};"/>`).join('')}
      <button class="mini-add-btn" data-action="add-listitem" title="Tambah">+</button>
    </div>` : ''}
  `;
}

function renderPhotoGrid(items){
  const withPhoto = (items||[]).filter(x=>x.url);
  if(!withPhoto.length) return '';
  return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:10px;">
    ${withPhoto.map(x=>`<div style="border-radius:10px;overflow:hidden;aspect-ratio:1/1;background:rgba(122,31,46,.05);"><img src="${escapeAttr(x.url)}" alt="${escapeAttr(x.label||'')}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.parentElement.style.display='none'"/></div>`).join('')}
  </div>`;
}

function setupCurrencyInput(el, getVal, setVal, onChangeExtra){
  if(!el) return;
  el.addEventListener('focus', ()=>{ el.value = digitsOnly(el.value); });
  el.addEventListener('input', ()=>{
    const raw = digitsOnly(el.value);
    const num = raw ? parseInt(raw,10) : 0;
    setVal(num); scheduleSave();
    if(onChangeExtra) onChangeExtra(num);
  });
  el.addEventListener('blur', ()=>{ el.value = fmtIDR(getVal()); });
}
function liveFormatNumberInput(el){
  if(!el) return;
  el.addEventListener('input', ()=>{
    const raw = digitsOnly(el.value);
    el.value = raw ? Number(raw).toLocaleString('id-ID') : '';
  });
}

  const doAddRequest = ()=>{

    const val = inp.value.trim();
    if(val){ state.requests.push({id:uid('r'), text:val, by: isVendor?'vendor':'client', date:new Date().toISOString(), status:'open'}); scheduleSave(); render(); }
  };
  if(addRequest) addRequest.addEventListener('click', doAddRequest);
  const requestInputEl = document.getElementById('requestInput');
  if(requestInputEl) requestInputEl.addEventListener('keydown', e=>{ if(e.key==='Enter') doAddRequest(); });
  document.querySelectorAll('[data-action="toggle-request"]').forEach(btn=> btn.addEventListener('click', ()=>{ const r = state.requests.find(x=>x.id===btn.dataset.id); r.status = r.status==='done'?'open':'done'; scheduleSave(); render(); }));
  document.querySelectorAll('[data-action="delete-request"]').forEach(btn=> btn.addEventListener('click', ()=>{ state.requests = state.requests.filter(x=>x.id!==btn.dataset.id); scheduleSave(); render(); }));

  document.querySelectorAll('.t-item').forEach(el=>{
    const id = el.dataset.id;
    const item = state.timeline.find(t=>t.id===id);
    el.querySelectorAll('[data-field]').forEach(field=>{
      const key = field.dataset.field;
      const evt = (field.tagName==='SELECT' || field.type==='date' || field.type==='checkbox') ? 'change' : 'input';
      field.addEventListener(evt, e=>{
        item[key] = field.type==='checkbox' ? e.target.checked : e.target.value;
        scheduleSave();
        if(key==='date' || key==='clientConfirmed') render();
      });
    });
    const toggleBtn = el.querySelector('[data-action="toggle-status"]');
    if(toggleBtn) toggleBtn.addEventListener('click', ()=>{ item.status = item.status==='done'?'upcoming':'done'; scheduleSave(); render(); });

    if(delBtn) delBtn.addEventListener('click', async ()=>{ if(await customConfirm('Hapus item pembayaran ini?')){ state.payments = state.payments.filter(x=>x.id!==id); scheduleSave(); render(); } });
    const invoiceInput = el.querySelector('[data-action="upload-invoice"]');
    if(invoiceInput) invoiceInput.addEventListener('change', async e=>{
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      if(file.size > 4*1024*1024){ await customAlert('Ukuran file maksimal 4MB. Pilih file yang lebih kecil ya.'); e.target.value=''; return; }
      try{
        let dataUrl, type;
        if(file.type && file.type.startsWith('image/')){
          // Invoice berupa foto: kompres dulu biar tidak kena batas ukuran storage.
          dataUrl = await compressImageFile(file, { maxChars: 40000, maxDim: 1000 });
          type = 'image/jpeg';
        } else {
          // PDF tidak bisa dikompres di browser — batas storage per-item ~45000 karakter.
          const reader = new FileReader();
          dataUrl = await new Promise((resolve, reject)=>{
            reader.onload = ()=> resolve(reader.result);
            reader.onerror = ()=> reject(new Error('Gagal membaca file.'));
            reader.readAsDataURL(file);
          });
          type = file.type;
          if(dataUrl.length > 44000){
            await customAlert('File PDF ini terlalu besar untuk disimpan (batas sekitar 32KB per file). Coba kompres PDF-nya dulu, atau lampirkan sebagai foto/scan.');
            e.target.value = '';
            return;
          }
        }
        // Simpan file invoice ke key TERPISAH dari data project (state), supaya
        // tidak ikut membengkakkan ukuran seluruh data project setiap kali disimpan.
        const ok = await storageSetWithRetry(invoiceFileKey(state.id, p.id), dataUrl, true);
        if(!ok){
          await customAlert('Gagal menyimpan invoice ke storage.\n\nDetail: ' + (lastStorageError || 'tidak diketahui'));
          e.target.value = '';
          return;
        }
        invoiceFileCache[p.id] = dataUrl;
        p.invoice = { name:file.name, type };
        scheduleSave(); render();
      }catch(err){
        await customAlert('Gagal memproses file invoice: ' + (err.message || err));
        e.target.value = '';
      }
    });
    const delInvoiceBtn = el.querySelector('[data-action="delete-invoice"]');
    if(delInvoiceBtn) delInvoiceBtn.addEventListener('click', async ()=>{
      if(await customConfirm('Hapus lampiran invoice ini?')){
        p.invoice = null;
        delete invoiceFileCache[id];
        try{ await window.storage.delete(invoiceFileKey(state.id, id), true); }catch(e){ /* kalau memang belum ada, abaikan */ }
        scheduleSave(); render();
      }
    });
  });

  const cateringPackageInput = document.getElementById('cateringPackageInput');
  if(cateringPackageInput) cateringPackageInput.addEventListener('input', e=>{ state.details.catering.packageName = e.target.value; scheduleSave(); });
  const cateringGuestCountInput = document.getElementById('cateringGuestCountInput');
  if(cateringGuestCountInput) cateringGuestCountInput.addEventListener('input', e=>{ state.details.catering.guestCount = e.target.value; scheduleSave(); });
  const cateringFamilyPicInput = document.getElementById('cateringFamilyPicInput');
  if(cateringFamilyPicInput) cateringFamilyPicInput.addEventListener('input', e=>{ state.details.catering.familyPicName = e.target.value; scheduleSave(); });

  const cdMap = { cdCpwNameInput:'cpwName', cdCpwContactInput:'cpwContact', cdCpwAddressInput:'cpwAddress', cdCpwFatherInput:'cpwFatherName', cdCpwMotherInput:'cpwMotherName', cdCppNameInput:'cppName', cdCppContactInput:'cppContact', cdCppAddressInput:'cppAddress', cdCppFatherInput:'cppFatherName', cdCppMotherInput:'cppMotherName' };
  Object.keys(cdMap).forEach(id=>{
    const inp = document.getElementById(id);
    if(inp) inp.addEventListener('input', e=>{ state.details.clientData[cdMap[id]] = e.target.value; scheduleSave(); });
  });
  const cdBirthMap = { cdCpwBirthInput:'cpwBirthDate', cdCppBirthInput:'cppBirthDate' };
  Object.keys(cdBirthMap).forEach(id=>{
    const inp = document.getElementById(id);
    if(inp) inp.addEventListener('change', e=>{ state.details.clientData[cdBirthMap[id]] = e.target.value; scheduleSave(); });
  });

  document.querySelectorAll('.mini-add[data-listpath]').forEach(container=>{
    const path = container.dataset.listpath;
    const btn = container.querySelector('[data-action="add-listitem"]');
    if(!btn) return;
    const doAdd = ()=>{
      const arr = getByPath(path);
      if(!arr) return;
      const entry = {id:uid('li')};
      let hasVal = false;
      container.querySelectorAll('[data-col]').forEach(inp=>{ entry[inp.dataset.col] = inp.value.trim(); if(inp.value.trim()) hasVal = true; });
      if(hasVal){ arr.push(entry); scheduleSave(); render(); }
    };
    btn.addEventListener('click', doAdd);
    container.querySelectorAll('[data-col]').forEach(inp=> inp.addEventListener('keydown', e=>{ if(e.key==='Enter') doAdd(); }));
  });

  document.querySelectorAll('.mini-item[data-listpath]').forEach(el=>{
    const path = el.dataset.listpath;
    const arr = getByPath(path);
    if(!arr) return;
    const item = arr.find(x=>x.id===el.dataset.id);
    if(!item) return;
    el.querySelectorAll('[data-field]').forEach(inp=>{
      inp.addEventListener('input', e=>{ item[inp.dataset.field] = e.target.value; scheduleSave(); });
    });
    const del = el.querySelector('[data-action="delete-listitem"]');
    if(del) del.addEventListener('click', ()=>{
      const idx = arr.indexOf(item);
      if(idx>-1) arr.splice(idx,1);
      scheduleSave(); render();
    });
  });
}

(async function init(){
  await initRoleFlow();
})();
</script>
</body>
</html>
